{% extends "base.html" %}
{% block content %}
<h1>Users</h1>

<div class="row g-3">
    <div class="col-md-4">
        <form method="post" class="card p-3">
            <h5>Create User</h5>
            <input class="form-control mb-2" name="name" placeholder="Name" required>
            <input class="form-control mb-2" name="email" placeholder="Email" required>
            <input class="form-control mb-2" name="password" placeholder="Password" required>
            <select class="form-select mb-2" name="role">
                <option value="agent">Agent</option>
                <option value="admin">Admin</option>
            </select>
            <button class="btn btn-primary">Create</button>
        </form>
    </div>

    <div class="col-md-8">
        <div class="card">
        <table class="table mb-0">
            <tr><th>Name</th><th>Email</th><th>Role</th><th>Created</th></tr>
            {% for u in users %}
            <tr><td>{{ u.name }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td><td>{{ u.created_at }}</td></tr>
            {% endfor %}
        </table>
        </div>
    </div>
</div>
{% endblock %}
