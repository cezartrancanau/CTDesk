{% extends "base.html" %}
{% block content %}
<h1>Customers</h1>

<div class="row g-3">
    <div class="col-md-4">
        <form method="post" class="card p-3">
            <h5>Add Customer Account</h5>
            <input class="form-control mb-2" name="name" placeholder="Name" required>
            <input class="form-control mb-2" name="email" placeholder="Email" required>
            <input class="form-control mb-2" name="password" placeholder="Password" value="customer123" required>
            <input class="form-control mb-2" name="phone" placeholder="Phone">
            <input class="form-control mb-2" name="company" placeholder="Company">
            <button class="btn btn-primary">Add</button>
        </form>
    </div>
    <div class="col-md-8">
        <div class="card">
        <table class="table mb-0">
            <tr><th>Name</th><th>Email</th><th>Phone</th><th>Company</th></tr>
            {% for c in customers %}
            <tr><td>{{ c.name }}</td><td>{{ c.email }}</td><td>{{ c.phone }}</td><td>{{ c.company }}</td></tr>
            {% endfor %}
        </table>
        </div>
    </div>
</div>
{% endblock %}
